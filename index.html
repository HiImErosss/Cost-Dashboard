<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Goldnet CFO Cost Dashboard</title>
<style>body{background:#07111f;color:#fff;font-family:Arial;padding:22px}h1{margin:0}.card,.panel{background:#132238;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.controls{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}select,input{width:100%;background:#07111f;color:#fff;border:1px solid #263a58;border-radius:12px;padding:10px;margin-top:6px}label,.small{color:#a8c1dc;font-size:12px}.value{font-size:28px;font-weight:800}.red{color:#fb7185}.blue{color:#38bdf8}.yellow{color:#fbbf24}.green{color:#34d399}.purple{color:#a78bfa}.bar{height:10px;background:#0b1424;border-radius:99px;overflow:hidden}.fill{height:10px;background:#fb7185}.row{margin:12px 0}.top{display:flex;justify-content:space-between;font-size:13px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid rgba(255,255,255,.1);padding:8px}th{text-align:left;color:#a8c1dc}.right{text-align:right}.months{height:240px;display:flex;align-items:flex-end;gap:12px;overflow:auto}.m{text-align:center;min-width:60px}.mb{width:36px;margin:auto;background:#fb7185;border-radius:8px 8px 0 0}.score{font-size:52px;font-weight:900}@media(max-width:900px){.grid,.grid2,.controls{grid-template-columns:1fr}}</style></head><body>
<h1>Goldnet CFO Cost Dashboard</h1><div class="small">Fixed logic: loại TOTAL CASH OUTFLOW, chỉ cộng cost parent thực tế; dòng con dùng drilldown</div><div id="status" class="panel">Loading...</div>
<div class="panel controls"><div><label>From</label><select id="from"></select></div><div><label>To</label><select id="to"></select></div><div><label>Group</label><select id="group"></select></div><div><label>Parent</label><select id="parent"></select></div><div><label>Debug</label><select id="debug"><option>Hide</option><option>Show</option></select></div></div>
<div id="kpi" class="grid"></div><div class="grid2"><div class="card"><h3>Cost Structure</h3><div id="structure"></div></div><div class="card"><h3>Monthly Trend</h3><div id="trend" class="months"></div></div><div class="card"><h3>Top Parent Drivers</h3><div id="drivers"></div></div><div class="card"><h3>Drilldown</h3><table><thead><tr><th>Parent</th><th>Line</th><th class="right">Amount</th></tr></thead><tbody id="detail"></tbody></table></div></div><pre id="dbg" class="panel" style="display:none"></pre>
<script>
const URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSW8UJiUFKOpEUtDPtjfVRJ35MRdBYTgT6v_3wsoqm6ORgPYE38Q50aO3z4PKq9LSHBwo5jDAgpRLcF/pub?gid=1702940056&single=true&output=csv'; const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
// Không dùng 124/125 nếu là Cash Out / TOTAL CASH OUTFLOW vì sẽ double count toàn bộ.
const PARENTS=["Giá vốn dịch vụ Livestream","Giá vốn dịch vụ Video","Giá vốn dịch vụ Shop","Giá vốn dịch vụ quản lý Affiliate","Chi Phí Lương","Bảo Hiểm Xã Hội","Chi phí vận hành nhân sự","Hành Chính","Chi phí thuê nhà & cơ sở vật chất","Chi Phí Khách Hàng","Chi phí Brand Marketing","Website & SEO","Tổ chức event marketing","Nội dung hình ảnh cho social","Công chứng / lệ phí hồ sơ","Dịch Vụ Kế Toán","Thuế & lệ phí nhà nước","Phần mềm, hệ thống hỗ trợ","Chi Phí Khác"];
let rows=[], months=[], parents=[], children=[];
function parseCSV(t){let a=[],r=[],c='',q=false;for(let i=0;i<t.length;i++){let x=t[i],n=t[i+1];if(x=='"'&&q&&n=='"'){c+='"';i++}else if(x=='"')q=!q;else if(x==','&&!q){r.push(c.trim());c=''}else if((x=='\n'||x=='\r')&&!q){if(x=='\r'&&n=='\n')i++;r.push(c.trim());if(r.some(v=>v))a.push(r);r=[];c=''}else c+=x}r.push(c.trim());if(r.some(v=>v))a.push(r);return a}
function norm(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function money(v){let s=String(v||'').replace(/[đ₫,\s]/g,'').replace(/\./g,'');return Number(s)||0}
function vnd(v){return new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(v||0)}
function sum(rs,ms){return rs.reduce((s,r)=>s+ms.reduce((a,m)=>a+(r.months[m]||0),0),0)}
function cls(l){let s=norm(l);if(s.includes('gia von'))return'COGS';if(s.includes('luong')||s.includes('bao hiem')||s.includes('nhan su'))return'People';if(s.includes('khach hang')||s.includes('marketing')||s.includes('website')||s.includes('social'))return'Selling';if(s.includes('hanh chinh')||s.includes('thue')||s.includes('ke toan')||s.includes('phan mem')||s.includes('cong chung'))return'G&A';return'Other'}
function bar(id,data){let mx=Math.max(...data.map(x=>x.v),1);document.getElementById(id).innerHTML=data.map(x=>`<div class=row><div class=top><span>${x.n}</span><b>${vnd(x.v)}</b></div><div class=bar><div class=fill style="width:${Math.max(2,x.v/mx*100)}%"></div></div></div>`).join('')}
function render(){let ms=MONTHS.slice(MONTHS.indexOf(from.value),MONTHS.indexOf(to.value)+1), gp=group.value, pp=parent.value;let ps=parents.filter(p=>(gp=='All'||p.group==gp)&&(pp=='All'||p.label==pp));let total=sum(ps,ms), c=sum(ps.filter(p=>p.group=='COGS'),ms), pe=sum(ps.filter(p=>p.group=='People'),ms), se=sum(ps.filter(p=>p.group=='Selling'),ms), ga=sum(ps.filter(p=>p.group=='G&A'),ms), ot=sum(ps.filter(p=>p.group=='Other'),ms);kpi.innerHTML=[['Total Cost',total,'red'],['COGS %',total?c/total*100:0,'blue'],['People %',total?pe/total*100:0,'yellow'],['OPEX %',total?(pe+se+ga+ot)/total*100:0,'purple']].map(x=>`<div class=card><div class=small>${x[0]}</div><div class="value ${x[2]}">${x[0].includes('%')?x[1].toFixed(1)+'%':vnd(x[1])}</div></div>`).join('');bar('structure',[{n:'COGS',v:c},{n:'People',v:pe},{n:'Selling',v:se},{n:'G&A',v:ga},{n:'Other',v:ot}]);bar('drivers',ps.map(p=>({n:p.label,v:sum([p],ms)})).sort((a,b)=>b.v-a.v));let mx=Math.max(...ms.map(m=>sum(ps,[m])),1);trend.innerHTML=ms.map(m=>`<div class=m><div class=mb style="height:${Math.max(8,sum(ps,[m])/mx*220)}px"></div><div>${m}</div><div>${(sum(ps,[m])/1e9).toFixed(1)}B</div></div>`).join('');let ch=children.filter(x=>pp=='All'||x.parent==pp);detail.innerHTML=ch.map(x=>`<tr><td>${x.parent}</td><td>${x.label}</td><td class=right>${vnd(sum([x],ms))}</td></tr>`).join('');dbg.style.display=debug.value=='Show'?'block':'none';dbg.textContent='PARENTS FOUND\n'+parents.map(p=>p.row+': '+p.label+' = '+p.group+' = '+p.total).join('\n')}
async function load(){let t=await (await fetch(URL+'&cache='+Date.now())).text();let tbl=parseCSV(t), hi=tbl.findIndex(r=>r.some(x=>MONTHS.includes(x)));let head=tbl[hi], idx=head.map((h,i)=>({h,i})).filter(x=>MONTHS.includes(x.h));months=idx.map(x=>x.h);let all=[];for(let i=0;i<tbl.length;i++){let lab=(tbl[i].slice(0,idx[0].i).find(v=>/[A-Za-zÀ-ỹ]/.test(v))||'').trim();if(!lab)continue;let mo={};idx.forEach(x=>mo[x.h]=money(tbl[i][x.i]));let tot=Object.values(mo).reduce((a,b)=>a+b,0);if(tot)all.push({row:i+1,label:lab,months:mo,total:tot})}parents=PARENTS.map(name=>all.find(r=>norm(r.label).includes(norm(name)))).filter(Boolean).map(r=>({...r,group:cls(r.label)}));parents.forEach((p,i)=>{let next=parents[i+1];all.filter(r=>r.row>p.row&&(!next||r.row<next.row)).forEach(r=>children.push({...r,parent:p.label,group:p.group}))});from.innerHTML=months.map(m=>`<option>${m}</option>`).join('');to.innerHTML=months.map(m=>`<option>${m}</option>`).join('');from.value=months[0];to.value=months[months.length-1];group.innerHTML=['All',...new Set(parents.map(p=>p.group))].map(x=>`<option>${x}</option>`).join('');parent.innerHTML=['All',...parents.map(p=>p.label)].map(x=>`<option>${x}</option>`).join('');[from,to,group,parent,debug].forEach(e=>e.onchange=render);status.innerHTML=`Loaded. Parent cost rows: <b>${parents.length}</b>. Đã loại Cash Out / Total Cash Out khỏi KPI.`;render()}
load().catch(e=>status.innerHTML='<span class=red>'+e.message+'</span>')
</script></body></html>
