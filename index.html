<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goldnet Cost Dashboard</title>
<style>
body{background:#07111f;color:#fff;font-family:Arial;padding:20px}
.card{background:#132238;padding:18px;border-radius:16px;margin:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.value{font-size:32px;font-weight:bold}
.small{color:#9fb3c8}
</style>
</head>
<body>
<h1>Goldnet Cost Dashboard</h1>
<div id="status">Loading...</div>
<div class="grid" id="kpi"></div>

<script>
const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vSW8UJiUFKOpEUtDPtjfVRJ35MRdBYTgT6v_3wsoqm6ORgPYE38Q50aO3z4PKq9LSHBwo5jDAgpRLcF/pub?gid=1702940056&single=true&output=csv"

function n(v){
 if(!v)return 0
 return Number(String(v).replace(/[đ₫,\s]/g,'').replace(/\./g,''))||0
}

function csvParse(t){
 let r=[],row=[],c="",q=false
 for(let i=0;i<t.length;i++){
  let x=t[i]
  if(x=='"')q=!q
  else if(x==','&&!q){row.push(c);c=""}
  else if((x=='\n'||x=='\r')&&!q){
   if(c||row.length){row.push(c);r.push(row)}
   row=[];c=""
  } else c+=x
 }
 return r
}

function find(rows,match){
 return rows.find(x=>String(x[1]||"").trim().startsWith(match))
}

function sumMonths(r){
 if(!r)return 0
 let s=0
 for(let i=2;i<=13;i++)s+=n(r[i])
 return s
}

async function load(){
 let t=await fetch(CSV)
 let tx=await t.text()
 let rows=csvParse(tx)

 const total=find(rows,"B. DÒNG TIỀN RA")
 const cogs=find(rows,"1. COGS")
 const people1=find(rows,"2. Lương")
 const people2=find(rows,"3. Chi phí vận hành nhân sự")
 const sell1=find(rows,"7. Chi Phí Khách Hàng")
 const sell2=find(rows,"8. Chi phí Marketing")
 const ga=find(rows,"4. Chi phí Hành Chính")

 const totalCost=sumMonths(total)
 const cogsCost=sumMonths(cogs)
 const people=sumMonths(people1)+sumMonths(people2)
 const selling=sumMonths(sell1)+sumMonths(sell2)
 const gna=sumMonths(ga)

 const kpis=[
 ["Total Cost",totalCost],
 ["COGS",cogsCost],
 ["People",people],
 ["Selling",selling],
 ["G&A",gna]
 ]

 document.getElementById("kpi").innerHTML=
 kpis.map(x=>`
 <div class=card>
 <div class=small>${x[0]}</div>
 <div class=value>${new Intl.NumberFormat('vi-VN').format(x[1])} đ</div>
 </div>`).join("")

 document.getElementById("status").innerHTML=
 "Logic fix: Total dùng dòng tổng; không cộng dòng con; COGS Service dùng 1.1-1.4 drilldown."
}

load()
</script>
</body>
</html>
