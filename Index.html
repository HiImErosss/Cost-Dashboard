<html><head><meta charset='utf8'><title>Goldnet Cost Dashboard</title><style>body{background:#07111f;color:#fff;font-family:Arial;padding:20px}.card{background:#132238;padding:15px;border-radius:15px;margin:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}</style></head><body><h1>Goldnet Cost Dashboard</h1><div id=s>Loading</div><div class=grid id=k></div><div class=card><h3>Cost by Month</h3><div id=m></div></div><div class=card><h3>Top Cost Category</h3><div id=c></div></div><script>const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vSW8UJiUFKOpEUtDPtjfVRJ35MRdBYTgT6v_3wsoqm6ORgPYE38Q50aO3z4PKq9LSHBwo5jDAgpRLcF/pub?gid=1702940056&single=true&output=csv';function p(t){let a=[],r=[],c='',q=false;for(let i=0;i<t.length;i++){let x=t[i],n=t[i+1];if(x=='"'&&q&&n=='"'){c+='"';i++}else if(x=='"')q=!q;else if(x==','&&!q){r.push(c);c=''}else if((x=='\n'||x=='\r')&&!q){if(r.length||c){r.push(c);a.push(r)}r=[];c=''}else c+=x}if(c||r.length){r.push(c);a.push(r)}return a}function n(x){return Number(String(x||0).replaceAll('.','').replaceAll('đ','').replaceAll(',','').trim())||0}function f(x){return new Intl.NumberFormat('vi-VN').format(x)+' đ'}fetch(CSV).then(x=>x.text()).then(t=>{let d=p(t),h=d[0],months=h.slice(2,14),total=0,cm={};months.forEach(x=>cm[x]=0);let cate=[];for(let i=1;i<d.length;i++){let s=0;months.forEach((m,j)=>{let v=n(d[i][j+2]);s+=v;cm[m]+=v});if(s>0)cate.push({name:d[i][1],sum:s});total+=s}cate.sort((a,b)=>b.sum-a.sum);document.getElementById('s').innerHTML='Loaded';document.getElementById('k').innerHTML='<div class=card><h3>Total Cost</h3><h2>'+f(total)+'</h2></div><div class=card><h3>Avg Monthly</h3><h2>'+f(total/12)+'</h2></div>';document.getElementById('m').innerHTML=Object.entries(cm).map(x=>x[0]+' '+f(x[1])).join('<br>');document.getElementById('c').innerHTML=cate.slice(0,10).map(x=>x.name+' '+f(x.sum)).join('<br>')})</script></body></html>
